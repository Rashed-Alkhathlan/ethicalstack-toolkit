<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EthicalStack Options</title>
    <link rel="stylesheet" href="options.css" />
</head>

<body>
    <main class="card">
        <h1>EthicalStack API</h1>
        <p>Set the base URL for the glossary API.</p>

        <label for="api-base-url">API Base URL</label>
        <input id="api-base-url" type="url" placeholder="https://hoarsely-penetralian-esperanza.ngrok-free.dev" />

        <div class="field">
            <label for="language-pair">Language Pair</label>
            <select id="language-pair">
                <option value="en-ar">English to Arabic</option>
                <option value="ar-en">Arabic to English</option>
                <option value="en-fr">English to French</option>
            </select>
        </div>

        <div class="field">
            <label for="theme">Theme</label>
            <select id="theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>

        <div class="field toggle-field">
            <label class="toggle-label">
                <input id="highlighting-enabled" type="checkbox" />
                <span>Auto-highlight glossary terms on pages</span>
            </label>
        </div>

        <div class="actions">
            <button id="save-button" type="button">Save</button>
            <button id="reset-button" type="button" class="ghost">Reset</button>
        </div>

        <div id="status" class="status"></div>
    </main>

    <script src="options.js" type="module"></script>
</body>

</html>
